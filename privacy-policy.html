            <div class="policy-content">
                <p>Настоящая Политика конфиденциальности описывает, как <strong>ТОО Aiprotocol.kz</strong> (далее "Мы")

                <p>Мы уважаем вашу конфиденциальность и обязуемся защищать ваши персональные данные в соответствии с
                    Законом Республики Казахстан от 21 мая 2013 года № 94-V «О персональных данных и их защите».</p>

                <h2>1. Сбор информации</h2>
                <p>Мы собираем следующую информацию, когда вы оставляете заявку на сайте или связываетесь с нами:</p>
                <ul>
                    <li>Имя</li>
                    <li>Номер телефона</li>
                    <li>Название компании</li>
                    <li>Отрасль деятельности</li>
                    <li>Прочие данные, которые вы добровольно предоставляете в сообщениях.</li>
                </ul>

                <h2>2. Цели использования данных</h2>
                <p>Собранная информация используется для:</p>
                <ul>
                    <li>Обработки вашей заявки и связи с вами по поводу наших услуг;</li>
                    <li>Предоставления консультаций и демонстрации продукта;</li>
                    <li>Улучшения качества нашего сервиса и сайта;</li>
                    <li>Отправки важной информации о продукте (при наличии согласия).</li>
                </ul>

                <h2>3. Защита данных</h2>
                <p>Мы принимаем необходимые организационные и технические меры для защиты ваших персональных данных от
                    неправомерного или случайного доступа, уничтожения, изменения, блокирования, копирования,
                    распространения, а также от иных неправомерных действий третьих лиц.</p>

                <h2>4. Передача данных третьим лицам</h2>
                <p>Мы не продаем, не обмениваем и не передаем ваши персональные данные посторонним лицам. Это не
                    относится к доверенным третьим сторонам, которые помогают нам в работе веб-сайта и ведении бизнеса
                    (например, почтовые сервисы, хостинг), при условии, что эти стороны соглашаются сохранять
                    конфиденциальность информации.</p>

                <h2>5. Файлы Cookie</h2>
                <p>Наш сайт может использовать файлы cookie для улучшения пользовательского опыта. Вы можете отключить
                    cookie в настройках вашего браузера, однако это может повлиять на работу некоторых функций сайта.
                </p>

                <h2>6. Ваши права</h2>
                <p>В соответствии с законодательством РК, вы имеете право на доступ к своим данным, их исправление,
                    удаление, а также отзыв согласия на обработку. Для реализации этих прав свяжитесь с нами.</p>

                <h2>7. Контакты</h2>
